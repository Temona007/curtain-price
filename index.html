<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curtain Price Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
  <div class="min-vh-100 d-flex flex-column">
    <header class="py-4 py-md-5 text-center">
      <div class="container">
        <h1 class="h2 fw-semibold text-dark mb-1">Curtain Price Calculator</h1>
        <p class="text-muted mb-0">Estimate your curtain costs in seconds</p>
      </div>
    </header>

    <main class="flex-grow-1 py-3 py-md-4">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-8 col-xl-6">
            <div class="card shadow-sm border-0 overflow-hidden">
              <div class="card-body p-4 p-md-5">
                <h2 class="text-uppercase small fw-semibold text-muted mb-4">Your Measurements</h2>

                <div class="row g-3 mb-4">
                  <div class="col-12 col-sm-6">
                    <label for="width" class="form-label fw-medium">Width <span class="text-muted fw-normal">(cm)</span></label>
                    <input type="number" class="form-control form-control-lg" id="width" min="50" max="500" value="200" placeholder="e.g. 200">
                  </div>
                  <div class="col-12 col-sm-6">
                    <label for="height" class="form-label fw-medium">Height <span class="text-muted fw-normal">(cm)</span></label>
                    <input type="number" class="form-control form-control-lg" id="height" min="100" max="400" value="240" placeholder="e.g. 240">
                  </div>
                </div>

                <div class="mb-4">
                  <label for="mountType" class="form-label fw-medium">Mount Type</label>
                  <select class="form-select form-select-lg" id="mountType"></select>
                </div>

                <div class="mb-4">
                  <label for="headerType" class="form-label fw-medium">Curtain Header Type</label>
                  <select class="form-select form-select-lg" id="headerType"></select>
                </div>

                <div class="mb-4">
                  <label for="fabricCost" class="form-label fw-medium">Fabric Cost <span class="text-muted fw-normal">(per m²)</span></label>
                  <input type="number" class="form-control form-control-lg" id="fabricCost" min="0" step="0.01" value="45" placeholder="e.g. 45">
                </div>

                <div class="border-top pt-4">
                  <div class="form-check form-switch form-check-lg mb-3">
                    <input class="form-check-input" type="checkbox" id="installation" checked>
                    <label class="form-check-label fw-medium" for="installation">Include Installation</label>
                  </div>
                  <div class="form-check form-switch form-check-lg">
                    <input class="form-check-input" type="checkbox" id="hemming">
                    <label class="form-check-label fw-medium" for="hemming">On-Site Hemming</label>
                  </div>
                </div>
              </div>

              <div class="card-footer bg-light border-0 pt-0">
                <div class="card-body pt-4 border-top">
                  <h2 class="text-uppercase small fw-semibold text-muted mb-3">Estimated Price</h2>
                  <div class="d-flex align-items-baseline gap-1 mb-1">
                    <span class="fs-4 fw-semibold text-muted">$</span>
                    <span class="display-5 fw-bold text-dark" id="totalPrice">0</span>
                  </div>
                  <p class="text-muted small mb-4">Total estimated cost including fabric & labor</p>
                  <div id="breakdown"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="py-3 text-center text-muted small border-top bg-white">
      <p class="mb-0">This is an estimate. Final pricing may vary based on fabric availability and project specifics.</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
